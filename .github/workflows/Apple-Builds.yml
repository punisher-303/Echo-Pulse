  create_release:
    name: Create Release (Apple)
    # ios_build is currently disabled due to 7-day signing limitations for free accounts.
    # To re-enable, uncomment the job above and add it back to the 'needs' array.
    needs: [macos_build]
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4

      - name: Create / Update Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: |
            echo_pulse_macos/*.dmg
            echo_pulse_macos/*.zip
          tag: v${{ needs.macos_build.outputs.version }}+2106
          token: ${{secrets.SECRET_KEY}}
          allowUpdates: true
          omitBody: true
          prerelease: true
